<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INFRA — Infrastructure, Abstracted</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111'/%3E%3Cpath d='M8 10h16v2H8zm2 4h12v2H10zm2 4h8v2H12z' fill='%23fff'/%3E%3Ccircle cx='26' cy='22' r='3' fill='%2322c55e'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FRANKLIN_PROFILE = {
      name: "Franklin Carrillo",
      headline: "Platform Engineer at Edward Jones",
      location: "Charlotte Metro",
      connectionCount: "130",
      followerCount: "131",
      education: [
        { school: "Georgia Institute of Technology", degree: "Master of Science - MS, Computer Science", period: "Jan 2022 - Dec 2024" },
        { school: "Florida Atlantic University", degree: "Bachelor of Science - BS, Computer Science", period: "2016 - 2019" }
      ],
      experience: [
        { company: "Edward Jones", role: "Platform Engineer", period: "Apr 2023 - Present · 3 yrs 3 mos" },
        { company: "Edward Jones", role: "DevOps/SRE Specialist", period: "Mar 2022 - Mar 2023 · 1 yr 1 mo" },
        { company: "American Express", role: "Service Assurance Engineer", period: "Sep 2019 - Mar 2022 · 2 yrs 7 mos", location: "Sunrise, Florida" },
        { company: "STORIS, Inc.", role: "Application Developer Spring Intern", period: "Jan 2019 - Mar 2019 · 3 mos", location: "Deerfield Beach, Florida" },
        { company: "Modernizing Medicine", role: "Web Developer Summer Intern", period: "Jun 2018 - Aug 2018 · 3 mos", location: "Boca Raton, Florida" },
        { company: "Aerospace Technologies Group", role: "IT Intern", period: "Oct 2017 - Mar 2018 · 6 mos", location: "Boca Raton, Florida" }
      ],
      certs: [
        { name: "Microsoft Certified: Azure Fundamentals", issuer: "Microsoft", date: "Issued Aug 2025", id: "1CD3BAEA8452D226" },
        { name: "IT Information Library Foundations Certification (ITIL)", issuer: "AXELOS Global Best Practice", date: "Issued Dec 2020" }
      ],
      linkedIn: "https://www.linkedin.com/in/franklin-carrillo-35994b15b/",
      skills: ["Splunk", "ITIL Certified"],
      activity: [
        "Shared: Microsoft Certified: Azure Fundamentals (9mo ago) — 11 reactions, 1 comment",
        "Shared: Completed Master of Science - CS at Georgia Tech (1yr ago) — 26 reactions, 9 comments"
      ]
    };

    function formatTime(date) {
      return date.toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' });
    }

    function App() {
      const [gotcha, setGotcha] = useState(false);
      const [gotchaData, setGotchaData] = useState(null);
      const careersRef = useRef(null);
      const [scrolled, setScrolled] = useState(false);
      const loadTime = useRef(new Date());

      useEffect(() => {
        const shouldScroll = new URLSearchParams(window.location.search).get('apply') === 'true' || window.location.hash.includes('apply');
        if (shouldScroll && careersRef.current) {
          setTimeout(() => careersRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' }), 600);
        }
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const triggerAutoScroll = (e) => {
        e.preventDefault();
        if (careersRef.current) careersRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const triggerGotcha = async (e) => {
        e.preventDefault();
        const clickTime = new Date();
        const timeOnPage = Math.round((clickTime - loadTime.current) / 1000);
        let ipData = { ip: "Unknown", city: "Unknown", country: "Unknown", org: "Unknown", isp: "Unknown", region: "Unknown", timezone: "Unknown", postal: "Unknown" };
        try {
          const r = await fetch('https://ipapi.co/json/');
          if (r.ok) ipData = await r.json();
        } catch (_) {}

        setGotchaData({
          clickTime,
          timeOnPage,
          ip: ipData.ip || "Unknown",
          city: ipData.city || "Unknown",
          region: ipData.region || "Unknown",
          country: ipData.country_name || "Unknown",
          org: ipData.org || "Unknown",
          isp: ipData.isp || "Unknown",
          timezone: ipData.timezone || "Unknown",
          postal: ipData.postal || "Unknown",
          url: window.location.href,
          path: window.location.pathname + window.location.search + window.location.hash,
          referrer: document.referrer || "Direct / None",
          screen: `${window.screen.width}x${window.screen.height}`,
          colorDepth: `${window.screen.colorDepth}-bit`,
          availScreen: `${window.screen.availWidth}x${window.screen.availHeight}`,
          devicePixelRatio: window.devicePixelRatio,
          language: navigator.language,
          languages: navigator.languages ? navigator.languages.join(', ') : 'Unknown',
          platform: navigator.platform || "Unknown",
          vendor: navigator.vendor || "Unknown",
          cookiesEnabled: navigator.cookieEnabled,
          doNotTrack: navigator.doNotTrack || "Not set",
          hardwareConcurrency: navigator.hardwareConcurrency || "Unknown",
          deviceMemory: navigator.deviceMemory || "Unknown",
          userAgent: navigator.userAgent,
          timezoneOffset: new Date().getTimezoneOffset(),
          localStorage: typeof localStorage !== 'undefined' ? Object.keys(localStorage).length + ' keys' : 'Disabled',
          sessionStorage: typeof sessionStorage !== 'undefined' ? 'Available' : 'Disabled',
          online: navigator.onLine ? 'Online' : 'Offline',
          touchSupport: 'ontouchstart' in window ? 'Yes' : 'No',
          pageLoadTime: formatTime(loadTime.current),
          clickTimeFormatted: formatTime(clickTime)
        });
        setGotcha(true);
      };

      if (gotcha && gotchaData) {
        const d = gotchaData;
        return (
          <div className="min-h-screen bg-black text-green-400 font-mono text-sm">
            <div className="max-w-6xl mx-auto px-4 py-8 space-y-6">
              <div className="text-center border-b border-green-800 pb-6">
                <h1 className="text-4xl font-bold text-red-500 tracking-tight mb-2">GT ASSIGNMENT 1</h1>
                <p className="text-green-300 text-base">Phishing Simulation — Social Engineering Exercise</p>
              </div>

              <div className="grid lg:grid-cols-2 gap-6">
                <div className="border border-green-700 bg-green-950/30 p-5 rounded space-y-2">
                  <h2 className="text-green-300 font-bold text-base border-b border-green-800 pb-2 mb-3">TARGET PROFILE — Franklin Carrillo</h2>
                  <p><span className="text-gray-500">Name:</span> <span className="text-white font-semibold">{FRANKLIN_PROFILE.name}</span></p>
                  <p><span className="text-gray-500">Headline:</span> {FRANKLIN_PROFILE.headline}</p>
                  <p><span className="text-gray-500">Location:</span> {FRANKLIN_PROFILE.location}</p>
                  <p><span className="text-gray-500">LinkedIn:</span> <span className="text-blue-400 break-all">{FRANKLIN_PROFILE.linkedIn}</span></p>
                  <p><span className="text-gray-500">Connections:</span> {FRANKLIN_PROFILE.connectionCount} ({FRANKLIN_PROFILE.followerCount} followers)</p>
                  <p><span className="text-gray-500">Skills:</span> {FRANKLIN_PROFILE.skills.join(', ')}</p>

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">Education</h3>
                  {FRANKLIN_PROFILE.education.map((e, i) => (
                    <p key={i} className="text-xs ml-2">- {e.degree}, <span className="text-gray-400">{e.school}</span> <span className="text-gray-600">({e.period})</span></p>
                  ))}

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">Experience</h3>
                  {FRANKLIN_PROFILE.experience.map((e, i) => (
                    <p key={i} className="text-xs ml-2">- {e.role} <span className="text-gray-400">@ {e.company}</span>{e.location ? ` · ${e.location}` : ''} <span className="text-gray-600">({e.period})</span></p>
                  ))}

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">Licenses & Certifications</h3>
                  {FRANKLIN_PROFILE.certs.map((c, i) => (
                    <p key={i} className="text-xs ml-2">- {c.name} <span className="text-gray-400">({c.issuer}, {c.date})</span>{c.id ? <span className="text-yellow-400"> — ID: {c.id}</span> : ''}</p>
                  ))}

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">Recent Activity</h3>
                  {FRANKLIN_PROFILE.activity.map((a, i) => (
                    <p key={i} className="text-xs ml-2">- {a}</p>
                  ))}
                </div>

                <div className="border border-green-700 bg-green-950/30 p-5 rounded space-y-2">
                  <h2 className="text-green-300 font-bold text-base border-b border-green-800 pb-2 mb-3">LIVE FINGERPRINT — Captured Data</h2>
                  <p><span className="text-gray-500">IP Address:</span> {d.ip}</p>
                  <p><span className="text-gray-500">Location:</span> {d.city}, {d.region}, {d.country} ({d.postal})</p>
                  <p><span className="text-gray-500">Timezone:</span> {d.timezone} (UTC{d.timezoneOffset > 0 ? '-' : '+'}{Math.abs(d.timezoneOffset / 60)})</p>
                  <p><span className="text-gray-500">ISP / Org:</span> {d.org} ({d.isp})</p>
                  <p><span className="text-gray-500">Page URL:</span> <span className="text-blue-300 break-all">{d.url}</span></p>
                  <p><span className="text-gray-500">Path:</span> <span className="text-blue-300">{d.path}</span></p>
                  <p><span className="text-gray-500">Referrer:</span> {d.referrer}</p>
                  <p><span className="text-gray-500">Page Load:</span> {d.pageLoadTime}</p>
                  <p><span className="text-gray-500">Action Time:</span> {d.clickTimeFormatted}</p>
                  <p><span className="text-gray-500">Time on Page:</span> {d.timeOnPage} seconds</p>

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">Device & Browser</h3>
                  <p><span className="text-gray-500">Screen:</span> {d.screen} (@{d.devicePixelRatio}x) · {d.availScreen} avail · {d.colorDepth}</p>
                  <p><span className="text-gray-500">Language:</span> {d.language} (accepted: {d.languages})</p>
                  <p><span className="text-gray-500">Platform:</span> {d.platform}</p>
                  <p><span className="text-gray-500">Vendor:</span> {d.vendor}</p>
                  <p><span className="text-gray-500">Hardware Concurrency:</span> {d.hardwareConcurrency} cores</p>
                  <p><span className="text-gray-500">Device Memory:</span> {d.deviceMemory} GB</p>
                  <p><span className="text-gray-500">Cookies Enabled:</span> {String(d.cookiesEnabled)}</p>
                  <p><span className="text-gray-500">Do Not Track:</span> {d.doNotTrack}</p>
                  <p><span className="text-gray-500">Touch Support:</span> {d.touchSupport}</p>
                  <p><span className="text-gray-500">Online Status:</span> {d.online}</p>
                  <p><span className="text-gray-500">localStorage:</span> {d.localStorage}</p>
                  <p><span className="text-gray-500">sessionStorage:</span> {d.sessionStorage}</p>

                  <h3 className="text-green-300 font-bold text-sm border-b border-green-800 pb-1 mt-4 mb-2">User Agent</h3>
                  <p className="text-xs text-gray-400 break-all leading-relaxed">{d.userAgent}</p>
              </div>
            </div>
            </div>
          </section>

          <section className="py-24 border-y border-white/5 bg-zinc-950/50">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid md:grid-cols-3 gap-px bg-white/5">
                <div className="bg-black p-10 group cursor-pointer" onClick={triggerGotcha}>
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Self-Healing</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Automated rollbacks and health checks. If a pod fails, the cluster automatically corrects state without manual intervention.</p>
                </div>
                <div className="bg-black p-10 group cursor-pointer" onClick={triggerGotcha}>
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Ephemeral Environments</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Every pull request generates an isolated, full-stack environment. Merging tears it down. Zero lingering cloud costs.</p>
                </div>
                <div className="bg-black p-10 group cursor-pointer" onClick={triggerGotcha}>
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Zero-Trust Guardrails</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Security policies are injected at the orchestrator level. Developers cannot bypass SOC2 requirements.</p>
                </div>
              </div>
            </div>
          </section>

          <section ref={careersRef} className="py-32 relative">
            <div className="max-w-3xl mx-auto px-6">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-5xl font-bold tracking-tighter text-white mb-6">Build the engine.</h2>
                <p className="text-zinc-400 text-lg font-light leading-relaxed">
                  Backed by $3M in seed funding and Y Combinator, we are a small, highly-technical team engineering the platform for the next decade of software. We're looking for founding platform engineers who understand systems deeply.
                </p>
              </div>
              <div className="relative rounded-lg overflow-hidden">
                <div className="absolute inset-0 rounded-lg z-0" style={{ background: 'conic-gradient(from 0deg, transparent 5%, #fff 25%, transparent 45%)', animation: 'spin-gradient 2.5s linear infinite' }}></div>
                <div className="relative z-10 m-[1.5px] rounded-lg border border-white/10 bg-zinc-950 p-8 md:p-12">
                <div className="absolute top-0 left-0 w-16 h-16 border-t border-l border-white opacity-20 pointer-events-none"></div>
                <div className="absolute bottom-0 right-0 w-16 h-16 border-b border-r border-white opacity-20 pointer-events-none"></div>
                <div className="flex items-center justify-between border-b border-white/10 pb-6 mb-8">
                  <div>
                    <h3 className="text-xl font-medium text-white">Founding Platform Engineer</h3>
                    <p className="text-zinc-500 text-sm mt-1">Charlotte, NC // Remote</p>
                  </div>
                  <svg className="text-zinc-700 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                </div>
                <form className="space-y-6" onSubmit={triggerGotcha}>
                  <div className="grid md:grid-cols-2 gap-6">
                    <input type="text" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="Full Name" />
                    <input type="email" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="Email Address" />
                  </div>
                  <input type="url" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="GitHub / Personal Site URL" />
                  <div className="pt-4 flex flex-col sm:flex-row gap-4">
                    <button type="submit" className="flex-1 bg-white text-black hover:bg-zinc-200 font-bold text-xs tracking-widest uppercase py-4 transition-colors">Submit Application</button>
                    <button type="button" onClick={triggerGotcha} className="flex-1 bg-transparent border border-white/20 hover:border-white text-white font-bold text-xs tracking-widest uppercase py-4 transition-colors flex items-center justify-center gap-3">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                      Quick Apply
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </section>

          <footer className="py-12 border-t border-white/5 text-center">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="text-white text-sm font-semibold tracking-widest">INFRA</div>
              <div className="text-zinc-600 text-xs uppercase tracking-widest">&copy; 2026 INFRA SYSTEMS INC.</div>
              <div className="flex gap-6 text-xs font-medium text-zinc-500 uppercase tracking-widest">
                <a href="#" onClick={triggerGotcha} className="hover:text-white transition-colors">X</a>
                <a href="#" onClick={triggerGotcha} className="hover:text-white transition-colors">Git</a>
                <a href="#" onClick={triggerGotcha} className="hover:text-white transition-colors">In</a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
