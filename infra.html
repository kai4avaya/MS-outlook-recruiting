<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INFRA — Infrastructure, Abstracted</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111'/%3E%3Cpath d='M8 10h16v2H8zm2 4h12v2H10zm2 4h8v2H12z' fill='%23fff'/%3E%3Ccircle cx='26' cy='22' r='3' fill='%2322c55e'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const careersRef = useRef(null);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const searchParams = new URLSearchParams(window.location.search);
        const shouldScroll = searchParams.get('apply') === 'true' || window.location.hash.includes('apply');
        if (shouldScroll && careersRef.current) {
          setTimeout(() => {
            careersRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 600);
        }
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const triggerAutoScroll = (e) => {
        e.preventDefault();
        if (careersRef.current) careersRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      return (
        <div className="min-h-screen bg-black text-zinc-300 font-sans selection:bg-white selection:text-black">
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes float-base { 0%,100%{transform:rotateX(60deg) rotateZ(-45deg) translateY(80px);box-shadow:-20px 20px 30px rgba(0,0,0,.8)} 50%{transform:rotateX(60deg) rotateZ(-45deg) translateY(90px);box-shadow:-10px 10px 20px rgba(0,0,0,.8)} }
            @keyframes float-mid { 0%,100%{transform:rotateX(60deg) rotateZ(-45deg) translateY(0);box-shadow:-30px 30px 40px rgba(0,0,0,.6)} 50%{transform:rotateX(60deg) rotateZ(-45deg) translateY(-5px);box-shadow:-20px 20px 30px rgba(0,0,0,.5)} }
            @keyframes float-top { 0%,100%{transform:rotateX(60deg) rotateZ(-45deg) translateY(-80px);box-shadow:-40px 40px 50px rgba(0,0,0,.4)} 50%{transform:rotateX(60deg) rotateZ(-45deg) translateY(-100px);box-shadow:-50px 50px 60px rgba(0,0,0,.3)} }
            @keyframes data-flow { 0%{transform:translateY(-100%) scaleY(0);opacity:0} 50%{transform:translateY(0%) scaleY(1);opacity:1} 100%{transform:translateY(100%) scaleY(0);opacity:0} }
            @keyframes particle-drop { 0%{top:-5%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:105%;opacity:0} }
            @keyframes spin-slow { 100%{transform:rotate(360deg)} }
            @keyframes pulse-node { 0%,100%{opacity:.4;box-shadow:none} 50%{opacity:1;box-shadow:0 0 15px #fff} }
            .layer-base{animation:float-base 8s ease-in-out infinite}
            .layer-mid{animation:float-mid 8s ease-in-out .5s infinite}
            .layer-top{animation:float-top 8s ease-in-out 1s infinite}
            .data-stream{animation:data-flow 2.5s cubic-bezier(.4,0,.2,1) infinite}
          `}} />

          <nav className={`fixed w-full z-50 transition-all duration-500 border-b ${scrolled ? 'bg-black/70 backdrop-blur-xl border-white/10 py-4' : 'bg-transparent border-transparent py-6'}`}>
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
              <div className="flex items-center gap-3 text-white">
                <div className="w-6 h-6 border-2 border-white flex items-center justify-center">
                  <div className="w-1.5 h-1.5 bg-white animate-pulse"></div>
                </div>
                <span className="font-semibold tracking-tight text-lg">INFRA</span>
              </div>
              <div className="hidden md:flex items-center gap-8 text-xs font-medium tracking-widest uppercase text-zinc-500">
                <a href="#" className="hover:text-white transition-colors">Platform</a>
                <a href="#" className="hover:text-white transition-colors">Docs</a>
                <a href="#" className="hover:text-white transition-colors">Network</a>
              </div>
              <div className="flex items-center gap-6">
                <button onClick={triggerAutoScroll} className="text-xs font-medium tracking-widest uppercase text-zinc-400 hover:text-white transition-colors flex items-center gap-2">
                  <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                  Careers
                </button>
                <button className="hidden md:block bg-white text-black hover:bg-zinc-200 px-5 py-2 text-xs font-bold tracking-widest uppercase transition-all">
                  Deploy
                </button>
              </div>
            </div>
          </nav>

          <section className="relative pt-40 pb-20 md:pt-48 md:pb-32 overflow-hidden min-h-[90vh] flex items-center">
            <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.03)_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] pointer-events-none"></div>
            <div className="max-w-7xl mx-auto px-6 relative z-10 w-full grid lg:grid-cols-2 gap-16 items-center">
              <div className="text-left">
                <div className="flex flex-wrap items-center gap-3 mb-8 text-[10px] sm:text-xs font-mono tracking-widest uppercase text-zinc-400">
                  <span className="border border-white/10 px-3 py-1.5 bg-white/5 backdrop-blur-sm">Y Combinator W25</span>
                  <span className="border border-white/10 px-3 py-1.5 bg-white/5 backdrop-blur-sm">$3M Seed Funded</span>
                </div>
                <h1 className="text-5xl md:text-7xl font-bold tracking-tighter text-white mb-6 leading-[1.05]">
                  Infrastructure,<br /><span className="text-zinc-600">abstracted.</span>
                </h1>
                <p className="text-lg md:text-xl text-zinc-400 max-w-lg mb-10 leading-relaxed font-light">
                  The unified internal developer platform. Define environments, enforce policy, and scale microservices without writing boilerplate.
                </p>
                <div className="flex flex-col sm:flex-row items-center gap-6">
                  <button className="w-full sm:w-auto bg-white hover:bg-zinc-200 text-black px-8 py-4 text-sm font-bold tracking-widest uppercase transition-all flex items-center justify-center gap-3">
                    Read Documentation
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                  </button>
                  <div className="flex items-center gap-3 text-sm text-zinc-500 font-mono">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
                    <span>npm i -g @infra/cli</span>
                  </div>
                </div>
              </div>

              <div className="relative h-[600px] w-full flex items-center justify-center hidden md:flex">
                <div className="absolute w-24 h-[400px] z-0 flex justify-between px-4">
                  <div className="w-px h-full bg-zinc-800/50 relative">
                    <div className="absolute top-0 left-0 w-[2px] h-12 bg-white/40 -ml-[.5px]" style={{animation:'particle-drop 3s infinite linear .2s'}}></div>
                  </div>
                  <div className="w-px h-full bg-zinc-800/50 relative">
                    <div className="w-full h-full bg-white/10 data-stream origin-top"></div>
                    <div className="absolute top-0 left-0 w-[3px] h-16 bg-white/80 -ml-[1px]" style={{animation:'particle-drop 2.2s infinite linear 1.5s'}}></div>
                  </div>
                  <div className="w-px h-full bg-zinc-800/50 relative">
                    <div className="absolute top-0 left-0 w-[2px] h-8 bg-zinc-400 -ml-[.5px]" style={{animation:'particle-drop 4s infinite linear .8s'}}></div>
                  </div>
                </div>

                <div className="layer-top absolute w-72 h-72 bg-black/80 backdrop-blur-md border border-white/20 rounded-3xl flex items-center justify-center z-30 transition-colors hover:border-white/50 cursor-crosshair overflow-hidden group">
                  <div className="absolute inset-0 flex items-center justify-center opacity-40 group-hover:opacity-100 transition-opacity duration-700">
                    <div className="w-56 h-56 border border-dashed border-zinc-600 rounded-full animate-[spin-slow_25s_linear_infinite] relative">
                      <div className="absolute -top-1.5 left-1/2 w-3 h-3 bg-white rounded-full shadow-[0_0_10px_#fff]"></div>
                      <div className="absolute top-1/2 -right-1.5 w-3 h-3 bg-white rounded-full" style={{animation:'pulse-node 2s infinite'}}></div>
                      <div className="absolute -bottom-1.5 left-1/2 w-3 h-3 bg-zinc-600 rounded-full"></div>
                      <div className="absolute top-1/2 -left-1.5 w-3 h-3 bg-zinc-400 rounded-full"></div>
                    </div>
                  </div>
                  <div className="transform rotate-z-[45deg] rotate-x-[-60deg] flex flex-col items-center gap-3 relative z-10 pointer-events-none">
                    <div className="bg-black/60 p-4 rounded-xl border border-white/10 backdrop-blur-md">
                      <svg className="text-white w-8 h-8" strokeWidth="1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <span className="text-xs font-mono text-white/90 uppercase tracking-widest bg-black/60 px-3 py-1.5 rounded backdrop-blur-md shadow-lg border border-white/5">Global Edge</span>
                  </div>
                </div>

                <div className="layer-mid absolute w-72 h-72 bg-zinc-900/90 backdrop-blur-md border border-zinc-700/80 rounded-3xl flex items-center justify-center z-20 transition-colors hover:border-zinc-400 cursor-crosshair overflow-hidden group shadow-[0_0_50px_rgba(0,0,0,.5)]">
                  <div className="absolute inset-8 grid grid-cols-4 gap-3 opacity-30 group-hover:opacity-80 transition-opacity duration-700">
                    {[...Array(16)].map((_, i) => (
                      <div key={i} className={`rounded-md border ${[2,5,10,14].includes(i)?'border-white/60 bg-white/20 shadow-[0_0_15px_rgba(255,255,255,.3)]':[8,9].includes(i)?'border-red-500/40 bg-red-500/10':'border-zinc-700 bg-zinc-800/40'} relative overflow-hidden`}>
                        {[2,5,10,14].includes(i) && <div className="absolute inset-0 bg-white/30 animate-ping rounded-md opacity-50" style={{animationDuration:`${2+(i%3)}s`}}></div>}
                      </div>
                    ))}
                  </div>
                  <div className="transform rotate-z-[45deg] rotate-x-[-60deg] flex flex-col items-center gap-3 relative z-10 pointer-events-none">
                    <div className="bg-zinc-900/80 p-4 rounded-xl border border-zinc-600 backdrop-blur-md">
                      <svg className="text-zinc-200 w-8 h-8" strokeWidth="1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>
                    </div>
                    <span className="text-xs font-mono text-zinc-300 uppercase tracking-widest bg-zinc-900/80 px-3 py-1.5 rounded backdrop-blur-md shadow-lg border border-zinc-700/50">Compute Core</span>
                  </div>
                </div>

                <div className="layer-base absolute w-72 h-72 bg-zinc-950/95 backdrop-blur-md border border-zinc-800 rounded-3xl flex items-center justify-center z-10 transition-colors hover:border-zinc-500 cursor-crosshair overflow-hidden group shadow-[0_0_50px_rgba(0,0,0,.8)]">
                  <div className="absolute inset-0 flex items-center justify-center opacity-30 group-hover:opacity-80 transition-opacity duration-700">
                    <div className="w-20 h-20 border-2 border-zinc-700 rounded-full flex items-center justify-center relative">
                      <div className="absolute w-full h-full border border-dashed border-zinc-600 rounded-full animate-[spin-slow_15s_linear_infinite_reverse]"></div>
                      <div className="absolute w-px h-16 bg-zinc-700/80 -top-16"></div>
                      <div className="absolute w-10 h-10 border border-zinc-600 bg-zinc-900 rounded-full -top-24 flex items-center justify-center"><div className="w-3 h-3 bg-zinc-500 rounded-full"></div></div>
                      <div className="absolute w-px h-16 bg-zinc-700/80 -bottom-16 rotate-45 origin-top"></div>
                      <div className="absolute w-10 h-10 border border-zinc-600 bg-zinc-900 rounded-full -bottom-20 -right-20 flex items-center justify-center"><div className="w-3 h-3 bg-zinc-400 rounded-full" style={{animation:'pulse-node 3s infinite'}}></div></div>
                      <div className="absolute w-px h-16 bg-zinc-700/80 -bottom-16 -rotate-45 origin-top"></div>
                      <div className="absolute w-10 h-10 border border-zinc-600 bg-zinc-900 rounded-full -bottom-20 -left-20 flex items-center justify-center"><div className="w-3 h-3 bg-zinc-500 rounded-full"></div></div>
                    </div>
                  </div>
                  <div className="transform rotate-z-[45deg] rotate-x-[-60deg] flex flex-col items-center gap-3 relative z-10 pointer-events-none">
                    <div className="bg-zinc-950/90 p-4 rounded-xl border border-zinc-800 backdrop-blur-md">
                      <svg className="text-zinc-500 w-8 h-8" strokeWidth="1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                    </div>
                    <span className="text-xs font-mono text-zinc-500 uppercase tracking-widest bg-zinc-950/90 px-3 py-1.5 rounded backdrop-blur-md shadow-lg border border-zinc-800/50">Stateful Data</span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section className="py-24 border-y border-white/5 bg-zinc-950/50">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid md:grid-cols-3 gap-px bg-white/5">
                <div className="bg-black p-10 group">
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Self-Healing</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Automated rollbacks and health checks. If a pod fails, the cluster automatically corrects state without manual intervention.</p>
                </div>
                <div className="bg-black p-10 group">
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Ephemeral Environments</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Every pull request generates an isolated, full-stack environment. Merging tears it down. Zero lingering cloud costs.</p>
                </div>
                <div className="bg-black p-10 group">
                  <svg className="text-zinc-600 w-8 h-8 mb-6 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                  <h3 className="text-white text-lg font-medium mb-3">Zero-Trust Guardrails</h3>
                  <p className="text-zinc-500 font-light leading-relaxed text-sm">Security policies are injected at the orchestrator level. Developers cannot bypass SOC2 requirements.</p>
                </div>
              </div>
            </div>
          </section>

          <section ref={careersRef} className="py-32 relative">
            <div className="max-w-3xl mx-auto px-6">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-5xl font-bold tracking-tighter text-white mb-6">Build the engine.</h2>
                <p className="text-zinc-400 text-lg font-light leading-relaxed">
                  Backed by $3M in seed funding and Y Combinator, we are a small, highly-technical team engineering the platform for the next decade of software. We're looking for founding platform engineers who understand systems deeply.
                </p>
              </div>
              <div className="border border-white/10 bg-zinc-950 p-8 md:p-12 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-16 h-16 border-t border-l border-white opacity-20"></div>
                <div className="absolute bottom-0 right-0 w-16 h-16 border-b border-r border-white opacity-20"></div>
                <div className="flex items-center justify-between border-b border-white/10 pb-6 mb-8">
                  <div>
                    <h3 className="text-xl font-medium text-white">Founding Platform Engineer</h3>
                    <p className="text-zinc-500 text-sm mt-1">Charlotte, NC // Remote</p>
                  </div>
                  <svg className="text-zinc-700 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                </div>
                <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                  <div className="grid md:grid-cols-2 gap-6">
                    <input type="text" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="Full Name" />
                    <input type="email" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="Email Address" />
                  </div>
                  <input type="url" className="w-full bg-transparent border-b border-zinc-800 py-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-zinc-700 placeholder:text-sm placeholder:uppercase placeholder:tracking-widest" placeholder="GitHub / Personal Site URL" />
                  <div className="pt-4 flex flex-col sm:flex-row gap-4">
                    <button className="flex-1 bg-white text-black hover:bg-zinc-200 font-bold text-xs tracking-widest uppercase py-4 transition-colors">Submit Application</button>
                    <button className="flex-1 bg-transparent border border-white/20 hover:border-white text-white font-bold text-xs tracking-widest uppercase py-4 transition-colors flex items-center justify-center gap-3">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                      Quick Apply
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </section>

          <footer className="py-12 border-t border-white/5 text-center">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="text-white text-sm font-semibold tracking-widest">INFRA</div>
              <div className="text-zinc-600 text-xs uppercase tracking-widest">&copy; 2026 INFRA SYSTEMS INC.</div>
              <div className="flex gap-6 text-xs font-medium text-zinc-500 uppercase tracking-widest">
                <a href="#" className="hover:text-white transition-colors">X</a>
                <a href="#" className="hover:text-white transition-colors">Git</a>
                <a href="#" className="hover:text-white transition-colors">In</a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
